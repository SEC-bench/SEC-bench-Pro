model = "kimi-k2.6"
api = "moonshot-cn"
project = "linux"
instances = ["CVE-2024-26921"]
outdir = "output/linux/opencode/example/kimi-k2.6/example"
timeout = 5400
prompt_template = "../prompts/baseline/task_prompt_linux.j2"
agents_md = "../prompts/baseline/AGENTS_linux.j2"
images_dir = "../projects/linux"

tracking = "none"
opencode_artifacts = "compact"
output_format = "json"
reasoning_effort = "high"
privileged = true
refresh_models = true
steps = 600

[permission]
bash = "allow"
edit = "allow"
grep = "allow"
glob = "allow"
lsp = "allow"
skill = "allow"
todowrite = "allow"
webfetch = "deny"
websearch = "deny"
question = "deny"
doom_loop = "allow"
external_directory = "allow"
task = "allow"

[permission.read]
"*" = "allow"
"*.env" = "deny"
"*.env.*" = "deny"
"*.env.example" = "allow"
