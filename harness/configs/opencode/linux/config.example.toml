model = "moonshotai.kimi-k2.5"
api = "bedrock"
project = "linux"
instances = ["CVE-2024-26921"]
outdir = "output/linux/opencode/example/kimi-k2.5"
timeout = 5400
prompt_template = "../prompts/baseline/task_prompt_linux.j2"
agents_md = "../prompts/baseline/AGENTS_linux.j2"
images_dir = "../projects/linux"

tracking = "none"
opencode_artifacts = "compact"
output_format = "json"
reasoning_effort = "high"
privileged = true
refresh_models = true
update_opencode_cli = true
opencode_update_method = "npm"
shell_network_sandbox = true
pure = true
steps = 600

[mcp.secb]
type = "local"
command = ["secb-linux-vm-mcp"]
enabled = true
timeout = 900000

[permission]
"*" = "deny"
bash = "allow"
edit = "allow"
grep = "allow"
glob = "allow"
list = "allow"
lsp = "allow"
skill = "allow"
todowrite = "allow"
webfetch = "deny"
websearch = "deny"
question = "deny"
doom_loop = "allow"
external_directory = "allow"
task = "allow"
"secb_*" = "allow"

[permission.read]
"*" = "allow"
"*.env" = "deny"
"*.env.*" = "deny"
"*.env.example" = "allow"
