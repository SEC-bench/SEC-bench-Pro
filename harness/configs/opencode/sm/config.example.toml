# Runtime and input paths -----------------------------------------------------
#
# outdir receives one timestamped run directory per invocation.
# timeout is per instance, in seconds.
# prompt_template is rendered into prompt.txt.
# agents_md is copied into the container worktree as AGENTS.md and also embedded
# in the generated OpenCode agent config.
# images_dir points at benchmark metadata directories, not Docker images.
outdir = "output/sm/opencode/example"
timeout = 5400
prompt_template = "../prompts/baseline/task_prompt_sm.j2"
agents_md = "../prompts/baseline/AGENTS_sm.j2"
images_dir = "../projects/sm"

# Tracking and artifacts ------------------------------------------------------
#
# tracking:
#   none  -> no issue tracking setup
#   beads -> initialize bd sqlite tracking inside the worktree
#   acov  -> enable acov shims; also set acov_path and optionally acov_subsystems
#
# opencode_artifacts:
#   compact -> default; saves trajectory/, opencode_session/ continuation bundle,
#              reasoning/, prompt/config/stdout, worktree diffs, audit files,
#              and results.
#   debug   -> compact plus raw OpenCode DB/WAL/SHM, storage, logs, tool output,
#              snapshots, and full project .opencode. This can be much larger.
tracking = "none"
opencode_artifacts = "compact"
# acov_path = "../acov"
# acov_subsystems = "v8"

# OpenCode run settings -------------------------------------------------------
#
# output_format is passed to `opencode run --format`. The latest OpenCode CLI
# documents: default or json. Keep json so the harness router can render raw
# tool calls, reasoning parts, and usage events.
output_format = "json"

# Reasoning and provider options ---------------------------------------------
#
# reasoning_effort is written as the documented OpenCode agent provider option:
#   agent.<agent_name>.reasoningEffort
#
# This is intentionally separate from OpenCode's model variant mechanism.
# Kimi models currently use provider options for reasoning control; do not set
# variant="high" unless OpenCode reports that the selected model supports that
# exact variant.
reasoning_effort = "high"

# Optional provider-specific options are written directly into the generated
# agent config, alongside reasoningEffort, so use the provider's documented
# camelCase option names.
# [agent_options]
# reasoningEffort = "high"
# textVerbosity = "low"

# Optional OpenCode model variant. Only enable when the selected model/provider
# exposes the named variant in OpenCode.
# variant = "provider-specific-variant"

# Optional harness/OpenCode settings -----------------------------------------
#
# opencode_cli: CLI command available inside each Docker image.
# agent_name: generated OpenCode primary agent name.
# privileged: run Docker containers with --privileged when a target requires it.
# skill_directory: local directory copied to worktree/.opencode/skills.
# steps: maximum OpenCode agentic iterations before forcing a text-only response.
# opencode_config: advanced raw config override, deep-merged into generated
#                  project-root opencode.json.
# opencode_cli = "opencode"
# agent_name = "secbench"
# privileged = false
# skill_directory = ".agents/skills"
steps = 100

# The harness disables OpenCode's per-edit git snapshots by default (writes
# snapshot = false into the generated opencode.json) to avoid overloading the
# large benchmark worktrees. Re-enable here only if you need them.
# [opencode_config]
# snapshot = true

# Permissions ----------------------------------------------------------------
#
# The harness uses this table by default if [permission] is omitted.
#
# Built-in tools from https://opencode.ai/docs/tools/#built-in:
#   bash, edit, write, read, grep, glob, lsp, apply_patch, skill, todowrite,
#   webfetch, websearch, question
#
# Permission notes from the OpenCode docs:
#   - write, apply_patch, and multiedit are controlled by the edit permission.
#   - websearch is only available when the provider/environment enables it.
#   - question is denied so the eval cannot wait for user input.
#   - webfetch/websearch are denied for reproducibility and offline benchmark
#     scope. The agent can still search local code with grep/glob/read/bash.
#   - doom_loop, external_directory, and task are documented permission keys,
#     not built-in tools. They are allowed to keep container runs autonomous.
#   - The harness intentionally does not pass unsupported approval-bypass CLI
#     flags. Autonomy is configured here in opencode.json instead.
#   - codesearch is listed on the permissions page as web/code search, but it
#     is not a built-in tool on the tools page, so it is intentionally omitted
#     here. Add `codesearch = "deny"` if your OpenCode build exposes it.
#
[permission]
bash = "allow"
edit = "allow"
grep = "allow"
glob = "allow"
lsp = "allow"
skill = "allow"
todowrite = "allow"
webfetch = "deny"
websearch = "deny"
question = "deny"
doom_loop = "allow"
external_directory = "allow"
task = "allow"

[permission.read]
"*" = "allow"
"*.env" = "deny"
"*.env.*" = "deny"
"*.env.example" = "allow"
